<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <radialGradient id="bgGlow" cx="50%" cy="42%" r="70%">
      <stop offset="0%" stop-color="#3a332a"/>
      <stop offset="100%" stop-color="#2b2620"/>
    </radialGradient>
    <linearGradient id="pageLeft" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f2ead9"/>
      <stop offset="100%" stop-color="#e4d8bd"/>
    </linearGradient>
    <linearGradient id="pageRight" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#f2ead9"/>
      <stop offset="100%" stop-color="#e4d8bd"/>
    </linearGradient>
    <linearGradient id="coverGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#a9834f"/>
      <stop offset="100%" stop-color="#7a5f3c"/>
    </linearGradient>
  </defs>

  <!-- background -->
  <rect width="64" height="64" rx="13" fill="url(#bgGlow)"/>

  <!-- book shadow -->
  <ellipse cx="32" cy="49" rx="21" ry="3.4" fill="#000000" opacity="0.28"/>

  <!-- back cover sliver (spine base) -->
  <path d="M32 15 L32 47 L10 44 L10 20 Z" fill="url(#coverGrad)" opacity="0.9"/>
  <path d="M32 15 L32 47 L54 44 L54 20 Z" fill="url(#coverGrad)" opacity="0.9"/>

  <!-- left page -->
  <path d="M32 17 C 25 14.5, 16 14.5, 11 17.5 L11 42.5 C 16 39.5, 25 39.5, 32 42 Z"
        fill="url(#pageLeft)" stroke="#7a5f3c" stroke-width="0.6"/>
  <!-- right page -->
  <path d="M32 17 C 39 14.5, 48 14.5, 53 17.5 L53 42.5 C 48 39.5, 39 39.5, 32 42 Z"
        fill="url(#pageRight)" stroke="#7a5f3c" stroke-width="0.6"/>

  <!-- spine -->
  <path d="M32 15.5 L32 43.5" stroke="#7a5f3c" stroke-width="1.4" stroke-linecap="round"/>

  <!-- page lines, left -->
  <g stroke="#a9834f" stroke-width="0.55" opacity="0.55">
    <path d="M14.5 21 C 20 19.5, 26 19.6, 30.5 21.2"/>
    <path d="M14.5 25 C 20 23.5, 26 23.6, 30.5 25.2"/>
    <path d="M14.5 29 C 20 27.5, 26 27.6, 30.5 29.2"/>
    <path d="M14.5 33 C 20 31.5, 26 31.6, 30.5 33.2"/>
  </g>
  <!-- page lines, right -->
  <g stroke="#a9834f" stroke-width="0.55" opacity="0.55">
    <path d="M49.5 21 C 44 19.5, 38 19.6, 33.5 21.2"/>
    <path d="M49.5 25 C 44 23.5, 38 23.6, 33.5 25.2"/>
    <path d="M49.5 29 C 44 27.5, 38 27.6, 33.5 29.2"/>
    <path d="M49.5 33 C 44 31.5, 38 31.6, 33.5 33.2"/>
  </g>

  <!-- arcane sigil glowing on the pages -->
  <g transform="translate(32 27.5)">
    <circle r="6.4" fill="none" stroke="#d9ab68" stroke-width="0.9" opacity="0.9"/>
    <path d="M0 -6.4 L1.9 -2 L6.4 -1.2 L3 1.8 L3.9 6.4 L0 3.8 L-3.9 6.4 L-3 1.8 L-6.4 -1.2 L-1.9 -2 Z"
          fill="#d9ab68" opacity="0.95"/>
    <circle r="1.5" fill="#f2ead9"/>
  </g>

  <!-- sparkles -->
  <g fill="#92bd8e">
    <circle cx="46" cy="14" r="1.15"/>
    <circle cx="18.5" cy="12.5" r="0.85"/>
  </g>
  <g fill="#d9ab68">
    <circle cx="50" cy="19" r="0.7"/>
  </g>
</svg>
